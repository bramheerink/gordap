name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + unit + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit + e2e)
        run: go test -count=1 ./...

      - name: go test -race
        run: go test -race -count=1 ./...

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Generate coverage profile
        run: go test -count=1 -coverprofile=cover.out ./...

      - name: Enforce coverage threshold (40%)
        # cmd/* binaries (gordap, gordap-seed, gordap-stress,
        # gordap-stress-aggregate) are exercised via realworld +
        # postgres-integration + manual stress runs, not unit tests.
        # That drags the package-weighted total below what a pure
        # library project would hit. 40% is the floor we hold; raise
        # when we add an integration-tagged unit suite for cmd/.
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | tr -d %)
          echo "total coverage: ${pct}%"
          if awk -v p="$pct" -v t=40 'BEGIN{exit !(p+0 < t)}'; then
            echo "::error::coverage ${pct}% below threshold 40%"
            exit 1
          fi

  fuzz:
    name: short fuzz pass
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Fuzz IDN normaliser
        run: go test -run=^$ -fuzz=FuzzNormalize -fuzztime=20s ./pkg/rdap/idn/...

      - name: Fuzz validate.Handle
        run: go test -run=^$ -fuzz=FuzzHandle -fuzztime=20s ./pkg/rdap/validate/...

      - name: Fuzz validate.PathSegment
        run: go test -run=^$ -fuzz=FuzzPathSegment -fuzztime=20s ./pkg/rdap/validate/...

      - name: Fuzz search.MatchPattern
        run: go test -run=^$ -fuzz=FuzzMatchPattern -fuzztime=20s ./pkg/rdap/search/...

  gosec:
    name: gosec static analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      # Baselined IDs (each a documented false positive in our context):
      #   G104 — error not handled (we use _ = err deliberately on log paths)
      #   G304 — file path provided as taint input (CLI tools take operator paths)
      #   G404 — math/rand instead of crypto/rand (stress runner: no crypto)
      #   G118 — goroutine uses context.Background() (intentional in stress;
      #          per-request ctx is detached from test ctx, see audit2 fix)
      #   G703 — path traversal via taint (CLI tool reads operator-supplied
      #          file list; not a server-side attack surface)
      #   G705 — XSS via taint (response cache returns application/rdap+json;
      #          there is no HTML rendering path)
      - uses: securego/gosec@master
        with:
          args: '-exclude=G104,G118,G304,G404,G703,G705 -fmt=text ./...'

  realworld:
    name: real-world conformance suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install openrdap CLI for interop
        run: go install github.com/openrdap/rdap/cmd/rdap@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rdap-org/validator CLI for second-opinion conformance
        run: make install-validator

      - name: Build gordap + run real-world suite
        run: make test-realworld
        env:
          PATH: ${{ github.workspace }}/go/bin:/usr/local/go/bin:/usr/local/bin:/usr/bin:/bin

  postgres-integration:
    name: postgres integration (testcontainers)
    runs-on: ubuntu-latest
    needs: test
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Run integration tests against real Postgres
        run: go test -tags=integration -count=1 -timeout=10m ./pkg/rdap/storage/postgres/...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
