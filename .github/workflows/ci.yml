name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + unit + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit + e2e)
        run: go test -count=1 ./...

      - name: go test -race
        run: go test -race -count=1 ./...

  realworld:
    name: real-world conformance suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install openrdap CLI for interop
        run: go install github.com/openrdap/rdap/cmd/rdap@latest

      - name: Build gordap + run real-world suite
        run: make test-realworld

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
